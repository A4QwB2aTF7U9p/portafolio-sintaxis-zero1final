<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Número Secreto - Sintaxis Zero</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

<header class="header">
    <nav class="menu">
        <a href="index.html">Inicio</a>
        <a href="About.html">Sobre Nosotros</a>
        <a href="Proyectos.html">Proyectos</a>
    </nav>
</header>

<main class="juego">

    <div class="juego-card">

        <h1>🎯 Número <span>Secreto</span></h1>

        <!-- IMAGEN -->
        <img src="assets/NS.jpg" class="imagen-juego" alt="Juego Número Secreto">

        <p class="descripcion-juego">
            Adivina el número oculto del 1 al 10 antes de quedarte sin intentos.
        </p>

        <div class="reglas-box">
            <p id="modo">Tienes 3 intentos</p>
        </div>

        <input 
            type="number" 
            id="numeroUsuario" 
            placeholder="Ingresa un número"
            min="1"
            max="10"
        >

        <div class="botones-juego">
            <button onclick="verificarNumero()">Intentar</button>
            <button onclick="nuevoJuego()">Nuevo Juego</button>
        </div>

        <p id="mensaje"></p>
        <p id="intentos"></p>

    </div>

</main>

<footer>
    Grupo Sintaxis Zero
</footer>

<script src="scripts/NS.js"></script>

</body>
</html>
